<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 580" width="400" height="580">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a001a"/>
      <stop offset="50%" stop-color="#1a0033"/>
      <stop offset="100%" stop-color="#0d001f"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8800ff"/>
      <stop offset="50%" stop-color="#ff00ff"/>
      <stop offset="100%" stop-color="#8800ff"/>
    </linearGradient>
    <linearGradient id="rift" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ff00ff" stop-opacity="0"/>
      <stop offset="40%" stop-color="#cc00ff" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#8800ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4400aa" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.5">
      <stop offset="0%" stop-color="#cc00ff" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#6600cc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1a0033" stop-opacity="0"/>
    </radialGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#8800ff" stroke-width="0.3" opacity="0.15"/>
    </pattern>
    <clipPath id="card-clip">
      <rect x="12" y="12" width="376" height="556" rx="16"/>
    </clipPath>
  </defs>

  <!-- Card body -->
  <rect x="4" y="4" width="392" height="572" rx="20" fill="url(#bg)" stroke="url(#border)" stroke-width="3"/>

  <!-- Grid overlay -->
  <rect x="12" y="12" width="376" height="556" rx="16" fill="url(#grid)" clip-path="url(#card-clip)"/>

  <!-- Inner border -->
  <rect x="20" y="20" width="360" height="540" rx="12" fill="none" stroke="#8800ff" stroke-width="1.5" opacity="0.5"/>
  <rect x="28" y="28" width="344" height="524" rx="8" fill="none" stroke="#6600aa" stroke-width="0.5" opacity="0.3"/>

  <!-- Central glow -->
  <ellipse cx="200" cy="260" rx="160" ry="180" fill="url(#glow)"/>

  <!-- Rift crack effect -->
  <g filter="url(#glow-filter)" opacity="0.9">
    <path d="M 200 80 Q 180 160 160 200 Q 140 240 170 280 Q 140 320 160 360 Q 180 400 200 480"
          stroke="#ff00ff" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M 200 80 Q 220 160 240 200 Q 260 240 230 280 Q 260 320 240 360 Q 220 400 200 480"
          stroke="#cc00ff" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Rift fill -->
    <path d="M 200 80 Q 180 160 160 200 Q 140 240 170 280 Q 140 320 160 360 Q 180 400 200 480 Q 220 400 240 360 Q 260 320 230 280 Q 260 240 240 200 Q 220 160 200 80 Z"
          fill="url(#rift)" opacity="0.6"/>
  </g>

  <!-- Energy particles -->
  <g filter="url(#neon)">
    <circle cx="150" cy="180" r="3" fill="#ff66ff" opacity="0.8"/>
    <circle cx="240" cy="200" r="2.5" fill="#aa44ff" opacity="0.7"/>
    <circle cx="170" cy="320" r="2" fill="#ff88ff" opacity="0.6"/>
    <circle cx="230" cy="340" r="3.5" fill="#cc44ff" opacity="0.8"/>
    <circle cx="185" cy="240" r="2" fill="#ff44cc" opacity="0.5"/>
    <circle cx="215" cy="260" r="2.5" fill="#ee66ff" opacity="0.7"/>
    <circle cx="160" cy="380" r="2" fill="#bb55ff" opacity="0.6"/>
    <circle cx="240" cy="150" r="2" fill="#ff55ee" opacity="0.5"/>
    <circle cx="145" cy="280" r="1.5" fill="#ff88cc" opacity="0.4"/>
    <circle cx="255" cy="300" r="1.5" fill="#dd66ff" opacity="0.4"/>
  </g>

  <!-- Portal rings -->
  <g filter="url(#neon)" opacity="0.4">
    <ellipse cx="200" cy="280" rx="100" ry="30" fill="none" stroke="#8800ff" stroke-width="1.5" transform="rotate(-10, 200, 280)"/>
    <ellipse cx="200" cy="280" rx="80" ry="24" fill="none" stroke="#cc00ff" stroke-width="1" transform="rotate(15, 200, 280)"/>
    <ellipse cx="200" cy="280" rx="120" ry="36" fill="none" stroke="#6600cc" stroke-width="1" transform="rotate(-5, 200, 280)"/>
  </g>

  <!-- Symbols around rift -->
  <g filter="url(#neon)" opacity="0.6">
    <text x="110" y="180" font-family="monospace" font-size="16" fill="#cc66ff" transform="rotate(-20,110,180)">&#x2726;</text>
    <text x="280" y="190" font-family="monospace" font-size="14" fill="#aa44ff" transform="rotate(15,280,190)">&#x2727;</text>
    <text x="120" y="400" font-family="monospace" font-size="18" fill="#dd55ff" transform="rotate(10,120,400)">&#x2736;</text>
    <text x="270" y="390" font-family="monospace" font-size="15" fill="#bb44ff" transform="rotate(-12,270,390)">&#x2726;</text>
    <text x="130" y="290" font-family="monospace" font-size="12" fill="#ee77ff">&#x25C6;</text>
    <text x="262" y="270" font-family="monospace" font-size="12" fill="#cc55ff">&#x25C6;</text>
  </g>

  <!-- Title: GACHA CARDS -->
  <g filter="url(#neon)">
    <text x="200" y="68" text-anchor="middle" font-family="'Press Start 2P', 'Courier New', monospace" font-size="28" font-weight="bold" fill="#ff00ff" letter-spacing="2">GACHA CARDS</text>
  </g>

  <!-- Subtitle: BOOSTER RIFT -->
  <g filter="url(#neon)">
    <rect x="100" y="80" width="200" height="32" rx="4" fill="#1a0033" stroke="#8800ff" stroke-width="1.5" opacity="0.9"/>
    <text x="200" y="102" text-anchor="middle" font-family="'Press Start 2P', 'Courier New', monospace" font-size="16" font-weight="bold" fill="#cc66ff" letter-spacing="3">BOOSTER RIFT</text>
  </g>

  <!-- Card count -->
  <g filter="url(#neon)">
    <rect x="140" y="490" width="120" height="28" rx="4" fill="#0d001a" stroke="#8800ff" stroke-width="1.5" opacity="0.9"/>
    <text x="200" y="510" text-anchor="middle" font-family="'Press Start 2P', 'Courier New', monospace" font-size="13" fill="#ff66ff" letter-spacing="1">7 CARDS</text>
  </g>

  <!-- Corner decorations -->
  <g stroke="#8800ff" stroke-width="2" fill="none" opacity="0.6">
    <path d="M 36 36 L 36 56 M 36 36 L 56 36"/>
    <path d="M 364 36 L 364 56 M 364 36 L 344 36"/>
    <path d="M 36 544 L 36 524 M 36 544 L 56 544"/>
    <path d="M 364 544 L 364 524 M 364 544 L 344 544"/>
  </g>

  <!-- Scanline effect -->
  <g opacity="0.04">
    <line x1="12" y1="50" x2="388" y2="50" stroke="#ffffff" stroke-width="1"/>
    <line x1="12" y1="100" x2="388" y2="100" stroke="#ffffff" stroke-width="1"/>
    <line x1="12" y1="150" x2="388" y2="150" stroke="#ffffff" stroke-width="1"/>
    <line x1="12" y1="200" x2="388" y2="200" stroke="#ffffff" stroke-width="1"/>
    <line x1="12" y1="250" x2="388" y2="250" stroke="#ffffff" stroke-width="1"/>
    <line x1="12" y1="300" x2="388" y2="300" stroke="#ffffff" stroke-width="1"/>
    <line x1="12" y1="350" x2="388" y2="350" stroke="#ffffff" stroke-width="1"/>
    <line x1="12" y1="400" x2="388" y2="400" stroke="#ffffff" stroke-width="1"/>
    <line x1="12" y1="450" x2="388" y2="450" stroke="#ffffff" stroke-width="1"/>
    <line x1="12" y1="500" x2="388" y2="500" stroke="#ffffff" stroke-width="1"/>
    <line x1="12" y1="550" x2="388" y2="550" stroke="#ffffff" stroke-width="1"/>
  </g>
</svg>