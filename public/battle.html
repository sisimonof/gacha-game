<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GACHA CARDS - Combat</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/auth-guard.js"></script>
  <script src="/js/reward-fx.js"></script>
  <script src="/js/profile-modal.js"></script>
  <script src="/js/page-guide.js"></script>
  <script>(function(){var t=localStorage.getItem('gacha-theme');if(t)document.documentElement.setAttribute('data-theme',t)})()</script>
  <script src="/js/theme-detect.js"></script>
  <script src="/js/page-transition.js"></script>
</head>
<body class="battle-page">
  <div class="bg-grid"></div>
  <div class="scanline-bar"></div>

  <!-- ===== BARRE SUPERIEURE ===== -->
  <div class="bt-topbar">
    <div class="bt-topbar-left">
      <span class="bt-opponent" id="opponent-name">VS ???</span>
      <span class="bt-info-chip bt-info-deck">&#x1F0CF; <span id="enemy-deck-count">0</span></span>
    </div>
    <div class="bt-topbar-center">
      <span class="bt-turn" id="battle-turn">TOUR 1</span>
      <span class="bt-mana-carry hidden" id="mana-carry-indicator" title="Mana conserve du tour precedent">&#x1F504; +<span id="mana-carry-count">0</span></span>
    </div>
    <div class="bt-topbar-right">
      <span class="bt-info-chip bt-info-deck">&#x1F0CF; <span id="player-deck-count">0</span></span>
    </div>
  </div>

  <!-- ===== MAIN ENNEMIE (cartes face cachee) ===== -->
  <div class="bt-enemy-hand" id="enemy-hand-row"></div>

  <!-- ===== INFO ROW ENNEMI (avatar + jauges horizontales) ===== -->
  <div class="bt-info-row bt-info-row--enemy">
    <div class="bt-avatar-row bt-avatar-row--enemy" id="enemy-avatar-hp"></div>
    <div class="bt-gauges-inline bt-gauges-inline--enemy">
      <div class="bt-gauge-row">
        <span class="bt-gauge-label">NRJ</span>
        <div class="bt-gauge bt-gauge--energy-enemy">
          <div class="bt-gauge-fill" id="enemy-energy-fill"></div>
        </div>
        <span class="bt-gauge-value" id="enemy-energy-value">0/0</span>
      </div>
      <div class="bt-gauge-row">
        <span class="bt-gauge-label">CRYS</span>
        <div class="bt-gauge bt-gauge--crystal-enemy">
          <div class="bt-gauge-fill" id="enemy-crystal-fill"></div>
        </div>
        <span class="bt-gauge-value" id="enemy-crystal-value">0</span>
      </div>
    </div>
  </div>

  <!-- ===== ZONE PRINCIPALE ===== -->
  <div class="bt-arena">
    <div class="bt-fields">
      <!-- Zone ennemie avec labels de rang -->
      <div class="bt-field bt-field--enemy" id="enemy-field">
        <div class="bt-slot-wrapper">
          <div class="bt-rank-label bt-rank-label--enemy">FLANC G</div>
          <div class="bt-slot" data-slot="0" data-side="enemy" onclick="clickFieldSlot('enemy', 0)">
            <div class="bt-slot-empty">VIDE</div>
          </div>
        </div>
        <div class="bt-slot-wrapper">
          <div class="bt-rank-label bt-rank-label--enemy">CENTRE</div>
          <div class="bt-slot" data-slot="1" data-side="enemy" onclick="clickFieldSlot('enemy', 1)">
            <div class="bt-slot-empty">VIDE</div>
          </div>
        </div>
        <div class="bt-slot-wrapper">
          <div class="bt-rank-label bt-rank-label--enemy">FLANC D</div>
          <div class="bt-slot" data-slot="2" data-side="enemy" onclick="clickFieldSlot('enemy', 2)">
            <div class="bt-slot-empty">VIDE</div>
          </div>
        </div>
      </div>

      <!-- Separateur -->
      <div class="bt-midline"></div>

      <!-- Zone joueur avec labels de rang -->
      <div class="bt-field bt-field--player" id="player-field">
        <div class="bt-slot-wrapper">
          <div class="bt-rank-label">FLANC G <span class="bt-rank-bonus">+1 ATK</span></div>
          <div class="bt-slot" data-slot="0" data-side="player" onclick="clickFieldSlot('player', 0)">
            <div class="bt-slot-empty">VIDE</div>
          </div>
        </div>
        <div class="bt-slot-wrapper">
          <div class="bt-rank-label">CENTRE <span class="bt-rank-bonus bt-rank-bonus--def">+1 DEF</span></div>
          <div class="bt-slot" data-slot="1" data-side="player" onclick="clickFieldSlot('player', 1)">
            <div class="bt-slot-empty">VIDE</div>
          </div>
        </div>
        <div class="bt-slot-wrapper">
          <div class="bt-rank-label">FLANC D <span class="bt-rank-bonus">+1 ATK</span></div>
          <div class="bt-slot" data-slot="2" data-side="player" onclick="clickFieldSlot('player', 2)">
            <div class="bt-slot-empty">VIDE</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Popup d'actions (overlay) -->
  <div class="bt-actions-overlay hidden" id="bt-actions" onclick="if(event.target===this){hideActionPanel();cancelAction()}">
    <div class="bt-actions-popup">
      <button class="bt-actions-close" onclick="hideActionPanel()">&times;</button>
      <div class="bt-actions-unit" id="bt-actions-unit"></div>
      <div class="bt-actions-buttons" id="bt-actions-buttons"></div>
    </div>
  </div>

  <!-- ===== ZONE JOUEUR FIXE (info + main + bouton) ===== -->
  <div class="bt-hand-bar">
    <!-- Info row joueur (avatar + jauges) -->
    <div class="bt-info-row bt-info-row--player">
      <div class="bt-avatar-row bt-avatar-row--player" id="player-avatar-hp"></div>
      <div class="bt-gauges-inline bt-gauges-inline--player">
        <div class="bt-gauge-row">
          <span class="bt-gauge-label">NRJ</span>
          <div class="bt-gauge bt-gauge--energy-player">
            <div class="bt-gauge-fill" id="player-energy-fill"></div>
          </div>
          <span class="bt-gauge-value" id="player-energy-value">1/1</span>
        </div>
        <div class="bt-gauge-row">
          <span class="bt-gauge-label">CRYS</span>
          <div class="bt-gauge bt-gauge--crystal-player">
            <div class="bt-gauge-fill" id="player-crystal-fill"></div>
          </div>
          <span class="bt-gauge-value" id="player-crystal-value">0</span>
        </div>
      </div>
    </div>
    <!-- Main du joueur -->
    <div class="bt-hand" id="player-hand"></div>
    <!-- Bouton fin de tour (centré) -->
    <button class="bt-end-turn" id="end-turn-btn" onclick="endTurn()">FIN DU TOUR &#x23E9;</button>
  </div>

  <!-- ===== COMBAT LOG BUTTON ===== -->
  <button class="bt-combat-log-btn" id="combat-log-btn" onclick="toggleCombatLog()">COMBAT TXT</button>

  <!-- ===== COMBAT LOG PANEL ===== -->
  <div class="bt-combat-log-panel" id="combat-log-panel">
    <div class="bt-combat-log-header">
      <span class="bt-combat-log-title">&#x1F4DC; JOURNAL DE COMBAT</span>
      <button class="bt-combat-log-close" onclick="toggleCombatLog()">&times;</button>
    </div>
    <div class="bt-combat-log-entries" id="combat-log-entries"></div>
  </div>

  <!-- ===== FORCE DEPLOY PICKER (Pines) ===== -->
  <div class="bt-force-deploy-overlay hidden" id="force-deploy-overlay">
    <div class="bt-force-deploy-content">
      <h2 class="bt-force-deploy-title">&#x1F332; EMPRISE DES PINS</h2>
      <p class="bt-force-deploy-subtitle">Choisissez la carte adverse a forcer</p>
      <div class="bt-force-deploy-cards" id="force-deploy-cards"></div>
    </div>
  </div>

  <!-- ===== OVERLAYS ===== -->
  <div class="battle-result-overlay hidden" id="battle-result">
    <div class="battle-result-box" id="battle-result-box">
      <h1 id="result-title"></h1>
      <div id="result-rewards"></div>
      <button class="submit-btn" id="result-btn" onclick="leaveBattle()">CONTINUER</button>
    </div>
  </div>

  <div class="battle-anim-overlay" id="battle-anim-overlay"></div>
  <div class="screen-flash hidden" id="screen-flash"></div>

  <!-- Combo Kill banner -->
  <div class="combo-kill-banner hidden" id="combo-kill-banner">COMBO KILL!</div>

  <script src="/js/toast.js"></script>
  <script src="/js/friends.js"></script>
  <script src="/js/card-renderer.js"></script>
  <script src="/js/battle.js"></script>
  <script src="/js/skeleton-loader.js"></script>
  <script src="/js/empty-states.js"></script>
  <script src="/js/keyboard-nav.js"></script>
  <script src="/js/mobile-nav.js"></script>
</body>
</html>
