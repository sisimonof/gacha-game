<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GACHA CARDS - Combat</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="bg-grid"></div>
  <div class="scanline-bar"></div>

  <div class="crt-screen">
    <div class="battle-wrapper">

      <!-- Header: Turn + Energy info -->
      <div class="battle-header">
        <div class="battle-info-left">
          <span class="battle-opponent" id="opponent-name">VS ???</span>
          <span class="battle-deck-count enemy-deck-count">🃏 <span id="enemy-deck-count">0</span></span>
          <span class="battle-hand-count">✋ <span id="enemy-hand-count">0</span></span>
        </div>
        <div class="battle-turn-display" id="battle-turn">TOUR 1</div>
        <div class="battle-info-right">
          <span class="battle-energy enemy-energy">⚡<span id="enemy-energy">0</span>/<span id="enemy-max-energy">0</span></span>
        </div>
      </div>

      <!-- Enemy field (3 slots) -->
      <div class="battle-field enemy-field" id="enemy-field">
        <div class="field-slot" data-slot="0" data-side="enemy" onclick="clickFieldSlot('enemy', 0)">
          <div class="field-slot-empty">VIDE</div>
        </div>
        <div class="field-slot" data-slot="1" data-side="enemy" onclick="clickFieldSlot('enemy', 1)">
          <div class="field-slot-empty">VIDE</div>
        </div>
        <div class="field-slot" data-slot="2" data-side="enemy" onclick="clickFieldSlot('enemy', 2)">
          <div class="field-slot-empty">VIDE</div>
        </div>
      </div>

      <!-- Battle log -->
      <div class="battle-log" id="battle-log"></div>

      <!-- Midline separator -->
      <div class="battle-midline"></div>

      <!-- Player field (3 slots) -->
      <div class="battle-field player-field" id="player-field">
        <div class="field-slot" data-slot="0" data-side="player" onclick="clickFieldSlot('player', 0)">
          <div class="field-slot-empty">VIDE</div>
        </div>
        <div class="field-slot" data-slot="1" data-side="player" onclick="clickFieldSlot('player', 1)">
          <div class="field-slot-empty">VIDE</div>
        </div>
        <div class="field-slot" data-slot="2" data-side="player" onclick="clickFieldSlot('player', 2)">
          <div class="field-slot-empty">VIDE</div>
        </div>
      </div>

      <!-- Player info bar -->
      <div class="battle-player-bar">
        <span class="battle-energy player-energy">⚡<span id="player-energy">2</span>/<span id="player-max-energy">2</span></span>
        <span class="battle-deck-count player-deck-count">🃏 <span id="player-deck-count">0</span></span>
        <div class="battle-action-buttons">
          <button class="btn-end-turn" id="end-turn-btn" onclick="endTurn()">FIN DU TOUR ⏩</button>
        </div>
      </div>

      <!-- Player hand -->
      <div class="battle-hand" id="player-hand"></div>

      <!-- Instruction bar -->
      <div class="battle-instruction" id="battle-instruction"></div>

      <!-- Result overlay -->
      <div class="battle-result-overlay hidden" id="battle-result">
        <div class="battle-result-box" id="battle-result-box">
          <h1 id="result-title"></h1>
          <div id="result-rewards"></div>
          <button class="submit-btn" id="result-btn" onclick="leaveBattle()">CONTINUER</button>
        </div>
      </div>
    </div>
  </div>

  <div class="battle-anim-overlay" id="battle-anim-overlay"></div>
  <div class="screen-flash hidden" id="screen-flash"></div>

  <script src="/js/card-renderer.js"></script>
  <script src="/js/battle.js"></script>
</body>
</html>
