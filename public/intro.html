<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GACHA CARDS - Initialisation</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/auth-guard.js"></script>
  <script>(function(){var t=localStorage.getItem('gacha-theme');if(t)document.documentElement.setAttribute('data-theme',t)})()</script>
  <script src="/js/theme-detect.js"></script>
  <script src="/js/page-transition.js"></script>
</head>
<body class="intro-page">
  <div class="intro-scanlines"></div>

  <div class="intro-terminal">
    <div class="intro-header">
      <span class="intro-header-dot intro-dot-red"></span>
      <span class="intro-header-dot intro-dot-yellow"></span>
      <span class="intro-header-dot intro-dot-green"></span>
      <span class="intro-header-title">GACHA_CARDS — terminal v1.0</span>
    </div>
    <div class="intro-body" id="intro-body">
      <div class="intro-text" id="intro-text"></div>
      <span class="intro-cursor" id="intro-cursor">█</span>
    </div>
    <div class="intro-footer">
      <button class="intro-enter-btn hidden" id="intro-enter" onclick="enterGame()">
        > COMMENCER L'ENTRAINEMENT_
      </button>
      <button class="intro-skip-btn" id="intro-skip" onclick="skipIntro()">
        [ PASSER ]
      </button>
    </div>
  </div>

  <script src="/js/skeleton-loader.js"></script>
  <script src="/js/empty-states.js"></script>
  <script src="/js/keyboard-nav.js"></script>
  <script src="/js/intro.js"></script>
</body>
</html>
