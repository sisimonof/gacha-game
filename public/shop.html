<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GACHA CARDS - Boutique</title>
  <link rel="stylesheet" href="/css/style.css">
  <script>(function(){var t=localStorage.getItem('gacha-theme');if(t)document.documentElement.setAttribute('data-theme',t)})()</script>
</head>
<body class="shop-page-v2">
  <div class="bg-grid"></div>
  <div class="scanline-bar"></div>

  <!-- ===== TOP NAVBAR ===== -->
  <nav class="dash-navbar">
    <div class="dash-navbar-inner">
      <div class="dash-nav-logo" data-text="GACHA CARDS">GACHA CARDS</div>
      <div class="dash-nav-links">
        <a href="/menu" class="dash-nav-link">ACCUEIL</a>
        <a href="/shop" class="dash-nav-link dash-nav-link--active dash-nav-link--shop">BOUTIQUE</a>
        <a href="/collection" class="dash-nav-link">COLLECTION</a>
        <a href="/mine" class="dash-nav-link dash-nav-link--mine">MINE</a>
        <a href="/combat" class="dash-nav-link dash-nav-link--combat">COMBAT</a>
        <a href="/battlepass" class="dash-nav-link dash-nav-link--bp">PASSE</a>
        <a href="/market" class="dash-nav-link dash-nav-link--market">MARCHE</a>
        <a href="/casino" class="dash-nav-link dash-nav-link--casino">CASINO</a>
        <a href="/stats" class="dash-nav-link dash-nav-link--stats">STATS</a>
        <a href="/fusion" class="dash-nav-link dash-nav-link--fusion">FORGE</a>
        <a href="/wiki" class="dash-nav-link">WIKI</a>
        <a href="/guilds" class="dash-nav-link dash-nav-link--guild">GUILDES</a>
      </div>
      <div class="dash-nav-user">
        <span class="dash-nav-stat" title="Credits">&#128176; <span id="nav-credits">0</span></span>
        <span class="dash-nav-stat energy-stat">&#9889; <span id="nav-energy">--</span></span>
        <span class="dash-nav-username" id="nav-username">???</span>
      </div>
    </div>
  </nav>

  <!-- ===== SHOP CONTENT — single horizontal scroll ===== -->
  <div class="shop-scroll-wrapper" id="shop-view">
    <div class="shop-scroll-track">

      <!-- Booster gratuit -->
      <div class="shop-item shop-item--free" id="free-booster" onclick="claimFreeBooster()">
        <div class="shop-item-badge shop-item-badge--free">GRATUIT</div>
        <div class="shop-item-visual">🎁</div>
        <div class="shop-item-name">DAILY</div>
        <div class="shop-item-sub">3 cartes</div>
        <button class="shop-item-btn shop-item-btn--free" id="free-btn">OUVRIR</button>
      </div>

      <!-- Boosters (filled by JS) -->
      <div class="shop-boosters-inline" id="boosters-shelf"></div>

      <!-- Séparateur visuel -->
      <div class="shop-separator">
        <div class="shop-sep-line"></div>
        <div class="shop-sep-label">CARTES DU JOUR</div>
        <div class="shop-sep-timer" id="daily-shop-timer">??:??:??</div>
        <div class="shop-sep-line"></div>
      </div>

      <!-- 3 cartes du jour (filled by JS) -->
      <div class="shop-daily-inline" id="daily-shop-cards"></div>

      <!-- Bouton code cadeau -->
      <div class="shop-item shop-item--giftcode" onclick="openGiftCodeModal()">
        <div class="shop-item-visual">🎫</div>
        <div class="shop-item-name">CODE</div>
        <div class="shop-item-sub">Cadeau</div>
        <button class="shop-item-btn shop-item-btn--code">ENTRER</button>
      </div>

    </div>
  </div>

  <!-- Modal code cadeau -->
  <div class="giftcode-modal-overlay hidden" id="giftcode-modal" onclick="closeGiftCodeModal(event)">
    <div class="giftcode-modal">
      <button class="giftcode-modal-close" onclick="closeGiftCodeModal()">&times;</button>
      <div class="giftcode-modal-icon">🎫</div>
      <h3 class="giftcode-modal-title">CODE CADEAU</h3>
      <div class="giftcode-modal-form">
        <input type="text" id="giftcode-input" class="giftcode-modal-input" placeholder="GACHA-XXXX-XXXX" maxlength="30" autocomplete="off" spellcheck="false">
        <button class="giftcode-modal-btn" id="giftcode-btn" onclick="redeemGiftCode()">UTILISER</button>
      </div>
      <p class="shop-giftcode-msg hidden" id="giftcode-msg"></p>
    </div>
  </div>

  <!-- VUE OUVERTURE -->
  <div class="opening-view hidden" id="opening-view">
    <div class="tear-container hidden" id="tear-container">
      <div class="tear-half tear-left" id="tear-left"></div>
      <div class="tear-half tear-right" id="tear-right"></div>
      <div class="tear-glow"></div>
    </div>

    <div class="reveal-scene hidden" id="reveal-scene">
      <h2 class="reveal-title" id="reveal-title">OUVERTURE...</h2>
      <div class="cards-reveal" id="cards-reveal"></div>
      <div class="reveal-buttons">
        <button class="submit-btn reveal-all-btn hidden" id="reveal-all-btn">> REVELER TOUT</button>
        <button class="submit-btn opening-done-btn hidden" id="done-btn">> CONTINUER</button>
      </div>
    </div>
  </div>

  <div class="screen-flash hidden" id="screen-flash"></div>
  <div class="credits-display">CREDITS: <span id="credits-count">0</span></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/friends.js"></script>
  <script src="/js/card-renderer.js"></script>
  <script src="/js/shop.js"></script>
  <script src="/js/mobile-nav.js"></script>
</body>
</html>
