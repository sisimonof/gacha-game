<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GACHA CARDS - Casino</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/auth-guard.js"></script>
  <script src="/js/reward-fx.js"></script>
  <script src="/js/profile-modal.js"></script>
  <script src="/js/page-guide.js"></script>
  <script>(function(){var t=localStorage.getItem('gacha-theme');if(t)document.documentElement.setAttribute('data-theme',t)})()</script>
  <script src="/js/theme-detect.js"></script>
  <script src="/js/page-transition.js"></script>
</head>
<body class="casino-page">
  <div class="bg-grid"></div>
  <div class="scanline-bar"></div>

  <!-- NAVBAR -->
  <nav class="dash-navbar">
    <div class="dash-navbar-inner">
      <div class="dash-nav-logo" data-text="GACHA CARDS">GACHA CARDS</div>
      <div class="dash-nav-links">
        <a href="/menu" class="dash-nav-link">ACCUEIL</a>
        <a href="/shop" class="dash-nav-link dash-nav-link--shop">BOUTIQUE</a>
        <a href="/collection" class="dash-nav-link">COLLECTION</a>
        <a href="/mine" class="dash-nav-link dash-nav-link--mine">MINE</a>
        <a href="/combat" class="dash-nav-link dash-nav-link--combat">COMBAT</a>
        <a href="/battlepass" class="dash-nav-link dash-nav-link--bp">PASSE</a>
        <a href="/market" class="dash-nav-link dash-nav-link--market">MARCHE</a>
        <a href="/casino" class="dash-nav-link dash-nav-link--active dash-nav-link--casino">CASINO</a>
        <a href="/stats" class="dash-nav-link dash-nav-link--stats">STATS</a>
        <a href="/fusion" class="dash-nav-link dash-nav-link--fusion">FORGE</a>
        <a href="/wiki" class="dash-nav-link">WIKI</a>
        <a href="/guilds" class="dash-nav-link dash-nav-link--guild">GUILDES</a>
      </div>
      <div class="dash-nav-user">
        <span class="dash-nav-stat" title="Credits">&#128176; <span id="nav-credits">0</span></span>
        <span class="dash-nav-stat energy-stat">&#9889; <span id="nav-energy">--</span></span>
        <button class="dash-nav-help" onclick="if(typeof showPageGuide==='function')showPageGuide()" title="Guide">?</button>
        <span class="dash-nav-username" id="nav-username">???</span>
      </div>
    </div>
  </nav>

  <!-- CASINO CONTENT -->
  <div class="casino-container">
    <h1 class="casino-title">CASINO</h1>

    <div class="casino-main">
      <!-- Wheel area -->
      <div class="casino-wheel-area">
        <div class="casino-pointer">&#9660;</div>
        <div class="casino-wheel-wrap" id="casino-wheel-wrap">
          <canvas id="casino-wheel" width="400" height="400"></canvas>
        </div>
      </div>

      <!-- Controls -->
      <div class="casino-controls">
        <div class="casino-jackpot-banner" id="jackpot-banner">
          <span class="casino-jackpot-icon">🏆</span>
          <span class="casino-jackpot-label">JACKPOT</span>
          <span class="casino-jackpot-amount" id="jackpot-amount">5 000</span>
          <span class="casino-jackpot-cr">CR</span>
        </div>
        <div class="casino-cost">COUT: <span class="casino-cost-amount">200 CR</span></div>
        <button class="casino-spin-btn" id="spin-btn" onclick="spin()">
          <span class="casino-spin-icon">&#127922;</span> TOURNER
        </button>
        <div class="casino-credits">TES CREDITS: <span id="casino-credits">0</span></div>
      </div>
    </div>

    <!-- Result -->
    <div class="casino-result hidden" id="casino-result">
      <div class="casino-result-label" id="result-label">PERDU</div>
      <div class="casino-result-detail" id="result-detail"></div>
    </div>

    <!-- History -->
    <div class="casino-history">
      <h3 class="casino-history-title">DERNIERS RESULTATS</h3>
      <div class="casino-history-list" id="history-list">
        <div class="casino-history-empty">Aucun resultat</div>
      </div>
    </div>
  </div>

  <!-- Flash ecran -->
  <div class="screen-flash hidden" id="screen-flash"></div>

  <div class="version-tag">v1.2.0</div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/friends.js"></script>
  <script src="/js/casino.js"></script>
  <script src="/js/skeleton-loader.js"></script>
  <script src="/js/empty-states.js"></script>
  <script src="/js/keyboard-nav.js"></script>
  <script src="/js/mobile-nav.js"></script>
</body>
</html>
