<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GACHA CARDS - Menu</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <button class="logout-btn" id="logout-btn">[ DECONNEXION ]</button>

  <div class="crt-screen">
    <div class="menu-wrapper">
      <h1 class="menu-title">GACHA CARDS</h1>
      <p class="menu-welcome">Bienvenue, <span id="username-display">???</span> <span class="cursor-blink">_</span></p>

      <!-- Bonus quotidien -->
      <div class="daily-container" id="daily-container">
        <button class="daily-btn" id="daily-btn" onclick="claimDaily()">
          <span class="daily-icon">🎁</span>
          <span class="daily-text">BONUS QUOTIDIEN<br><small>+200 CR</small></span>
        </button>
      </div>

      <!-- Grille du menu -->
      <div class="menu-grid">
        <button class="menu-btn unlocked" onclick="window.location.href='/fusion'">
          <span class="btn-icon">🎴</span>
          <span class="btn-label">INVOQUER</span>
        </button>
        <button class="menu-btn unlocked" onclick="window.location.href='/collection'">
          <span class="btn-icon">📖</span>
          <span class="btn-label">COLLECTION</span>
        </button>
        <button class="menu-btn unlocked" onclick="window.location.href='/combat'">
          <span class="btn-icon">⚔️</span>
          <span class="btn-label">COMBAT</span>
        </button>
        <button class="menu-btn unlocked" onclick="window.location.href='/shop'">
          <span class="btn-icon">🏪</span>
          <span class="btn-label">BOUTIQUE</span>
        </button>
      </div>

      <!-- Bouton Admin (visible seulement pour les admins) -->
      <button class="menu-btn unlocked hidden" id="admin-btn" onclick="window.location.href='/admin'" style="border-color:#ff4444;color:#ff4444;grid-column:1/-1">
        <span class="btn-icon">🛡️</span>
        <span class="btn-label">ADMIN PANEL</span>
      </button>

      <!-- Barre de statut -->
      <div class="status-bar">
        <div>SYSTEME: <span>EN LIGNE</span></div>
        <div>CARTES: <span id="stat-cards">0</span></div>
        <div>CREDITS: <span id="stat-credits">0</span></div>
      </div>
    </div>
  </div>

  <div class="version-tag">v0.6.0</div>

  <script src="/js/menu.js"></script>
</body>
</html>
