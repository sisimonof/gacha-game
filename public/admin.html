<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GACHA CARDS - Admin Panel</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <button class="back-btn" onclick="window.location.href='/menu'">[ RETOUR ]</button>

  <div class="crt-screen">
    <div class="admin-wrapper">
      <h1 class="menu-title" style="color:#ff4444; text-shadow:0 0 10px #ff4444,0 0 20px #ff4444">ADMIN PANEL</h1>

      <!-- Stats -->
      <div class="admin-section" id="stats-section">
        <h2 class="admin-section-title">STATISTIQUES</h2>
        <div class="admin-stats" id="admin-stats"></div>
      </div>

      <!-- Tabs -->
      <div class="admin-tabs">
        <button class="admin-tab active" onclick="showTab('users')">JOUEURS</button>
        <button class="admin-tab" onclick="showTab('cards')">CARTES</button>
        <button class="admin-tab" onclick="showTab('give')">DONNER</button>
        <button class="admin-tab" onclick="showTab('create')">CREER CARTE</button>
      </div>

      <!-- Tab: Users -->
      <div class="admin-panel" id="tab-users">
        <table class="admin-table" id="users-table">
          <thead>
            <tr><th>ID</th><th>Pseudo</th><th>Credits</th><th>Cartes</th><th>Admin</th><th>Actions</th></tr>
          </thead>
          <tbody id="users-body"></tbody>
        </table>
      </div>

      <!-- Tab: Cards -->
      <div class="admin-panel hidden" id="tab-cards">
        <table class="admin-table" id="cards-table">
          <thead>
            <tr><th>ID</th><th>Nom</th><th>Rarete</th><th>Type</th><th>Elem</th><th>ATK</th><th>DEF</th><th>PV</th><th>Ability</th><th>Actions</th></tr>
          </thead>
          <tbody id="cards-body"></tbody>
        </table>
      </div>

      <!-- Tab: Give -->
      <div class="admin-panel hidden" id="tab-give">
        <div class="admin-form">
          <h3>Donner des credits</h3>
          <div class="admin-form-row">
            <label>Joueur (ID):</label>
            <input type="number" id="give-credits-user" placeholder="User ID">
            <label>Montant:</label>
            <input type="number" id="give-credits-amount" placeholder="1000">
            <button class="submit-btn admin-small-btn" onclick="giveCredits()">DONNER</button>
          </div>

          <h3>Donner une carte</h3>
          <div class="admin-form-row">
            <label>Joueur (ID):</label>
            <input type="number" id="give-card-user" placeholder="User ID">
            <label>Carte (ID):</label>
            <input type="number" id="give-card-id" placeholder="Card ID">
            <label><input type="checkbox" id="give-card-shiny"> Shiny</label>
            <label><input type="checkbox" id="give-card-fused"> Fused</label>
            <button class="submit-btn admin-small-btn" onclick="giveCard()">DONNER</button>
          </div>

          <h3>Modifier credits (valeur exacte)</h3>
          <div class="admin-form-row">
            <label>Joueur (ID):</label>
            <input type="number" id="set-credits-user" placeholder="User ID">
            <label>Nouveau montant:</label>
            <input type="number" id="set-credits-amount" placeholder="999999">
            <button class="submit-btn admin-small-btn" onclick="setCredits()">DEFINIR</button>
          </div>
        </div>
      </div>

      <!-- Tab: Create Card -->
      <div class="admin-panel hidden" id="tab-create">
        <div class="admin-form">
          <h3>Creer une nouvelle carte</h3>
          <div class="admin-form-grid">
            <div class="admin-form-row">
              <label>Nom:</label>
              <input type="text" id="new-card-name" placeholder="Nom de la carte">
            </div>
            <div class="admin-form-row">
              <label>Rarete:</label>
              <select id="new-card-rarity">
                <option value="commune">Commune</option>
                <option value="rare">Rare</option>
                <option value="epique">Epique</option>
                <option value="legendaire">Legendaire</option>
              </select>
            </div>
            <div class="admin-form-row">
              <label>Type:</label>
              <select id="new-card-type">
                <option value="guerrier">Guerrier</option>
                <option value="mage">Mage</option>
                <option value="bete">Bete</option>
                <option value="divin">Divin</option>
              </select>
            </div>
            <div class="admin-form-row">
              <label>Element:</label>
              <select id="new-card-element">
                <option value="feu">Feu</option>
                <option value="eau">Eau</option>
                <option value="terre">Terre</option>
                <option value="lumiere">Lumiere</option>
                <option value="ombre">Ombre</option>
              </select>
            </div>
            <div class="admin-form-row">
              <label>ATK:</label><input type="number" id="new-card-atk" value="5">
              <label>DEF:</label><input type="number" id="new-card-def" value="5">
              <label>PV:</label><input type="number" id="new-card-hp" value="25">
              <label>Mana:</label><input type="number" id="new-card-mana" value="3">
            </div>
            <div class="admin-form-row">
              <label>Ability:</label>
              <input type="text" id="new-card-ability" placeholder="Nom du pouvoir">
              <label>Desc:</label>
              <input type="text" id="new-card-ability-desc" placeholder="Description">
            </div>
            <div class="admin-form-row">
              <label>Image (fichier .png):</label>
              <input type="text" id="new-card-image" placeholder="nom.png">
            </div>
            <button class="submit-btn" onclick="createCard()">CREER LA CARTE</button>
          </div>
        </div>
      </div>

      <!-- Feedback -->
      <div class="admin-feedback hidden" id="admin-feedback"></div>
    </div>
  </div>

  <div class="version-tag">v0.6.0</div>
  <script src="/js/card-renderer.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
