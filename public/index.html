<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GACHA CARDS - Connexion</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="crt-screen">
    <div class="auth-container">
      <h1 class="auth-title">GACHA CARDS</h1>
      <p class="auth-subtitle">- Terminal d'accès -</p>

      <!-- Onglets -->
      <div class="tab-container">
        <button class="tab-btn active" data-tab="login">CONNEXION</button>
        <button class="tab-btn" data-tab="register">INSCRIPTION</button>
      </div>

      <!-- Formulaire Connexion -->
      <form id="login-form" class="form-panel active">
        <div class="form-group">
          <label>Identifiant :</label>
          <input type="text" id="login-username" placeholder="Entrez votre pseudo..." autocomplete="username">
        </div>
        <div class="form-group">
          <label>Mot de passe :</label>
          <input type="password" id="login-password" placeholder="Entrez votre mot de passe..." autocomplete="current-password">
        </div>
        <button type="submit" class="submit-btn">> SE CONNECTER</button>
        <p id="login-msg" class="message"></p>
      </form>

      <!-- Formulaire Inscription -->
      <form id="register-form" class="form-panel">
        <div class="form-group">
          <label>Choisir un pseudo :</label>
          <input type="text" id="reg-username" placeholder="3-20 caractères..." autocomplete="username">
        </div>
        <div class="form-group">
          <label>Choisir un mot de passe :</label>
          <input type="password" id="reg-password" placeholder="4 caractères minimum..." autocomplete="new-password">
        </div>
        <div class="form-group">
          <label>Confirmer le mot de passe :</label>
          <input type="password" id="reg-password2" placeholder="Retapez le mot de passe..." autocomplete="new-password">
        </div>
        <button type="submit" class="submit-btn">> S'INSCRIRE</button>
        <p id="reg-msg" class="message"></p>
      </form>
    </div>
  </div>

  <div class="version-tag">v0.1.0</div>

  <script src="/js/auth.js"></script>
</body>
</html>
