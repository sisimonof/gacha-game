<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GACHA CARDS - Combat</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="bg-grid"></div>
  <div class="scanline-bar"></div>
  <button class="back-btn" onclick="window.location.href='/menu'">[ RETOUR ]</button>

  <div class="crt-screen">
    <div class="combat-hub">
      <h1 class="menu-title" data-text="COMBAT">COMBAT</h1>

      <div class="combat-grid">
        <!-- IA -->
        <button class="combat-mode-btn combat-mode-ia" onclick="showDeckSelect('ia')">
          <span class="combat-mode-icon">🤖</span>
          <span class="combat-mode-label">IA</span>
          <span class="combat-mode-desc">Affrontez l'intelligence artificielle</span>
        </button>

        <!-- PVP temps reel -->
        <button class="combat-mode-btn combat-mode-pvp" onclick="showDeckSelect('pvp')">
          <span class="combat-mode-icon">⚔️</span>
          <span class="combat-mode-label">PVP</span>
          <span class="combat-mode-desc">Affrontez un joueur en temps reel</span>
        </button>
      </div>

      <!-- Liens secondaires -->
      <div style="display:flex; gap:12px; justify-content:center; margin-top:16px;">
        <button class="deck-select-cancel" onclick="window.location.href='/decks'" style="font-size:8px;">🃏 MES DECKS</button>
        <button class="deck-select-cancel" onclick="window.location.href='/wiki'" style="font-size:8px;">📖 WIKI</button>
      </div>

      <!-- Deck selection overlay -->
      <div class="deck-select-overlay hidden" id="deck-select-overlay">
        <div class="deck-select-modal">
          <h2 class="deck-select-title">CHOISIR UN DECK</h2>
          <div class="deck-select-list" id="deck-select-list"></div>
          <div class="deck-select-or">— OU —</div>
          <button class="combat-mode-btn combat-starter-btn" onclick="startBattle('starter')">
            <span class="combat-mode-icon">🎮</span>
            <span class="combat-mode-label">DECK STARTER</span>
            <span class="combat-mode-desc">Deck de test gratuit (cartes faibles)</span>
          </button>
          <button class="deck-select-cancel" onclick="hideDeckSelect()">ANNULER</button>
        </div>
      </div>

      <!-- Loading IA -->
      <div class="combat-loading hidden" id="combat-loading">
        <div class="loading-text">Lancement du combat...</div>
      </div>

      <!-- PVP Searching overlay -->
      <div class="pvp-searching-overlay hidden" id="pvp-searching">
        <div class="pvp-searching-content">
          <div class="pvp-searching-spinner"></div>
          <div class="pvp-searching-title">RECHERCHE PVP</div>
          <div class="pvp-searching-text">En attente d'un adversaire...</div>
          <div class="pvp-searching-timer" id="pvp-timer">0:00</div>
          <button class="deck-select-cancel" onclick="cancelPvpSearch()">ANNULER</button>
        </div>
      </div>

    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/card-renderer.js"></script>
  <script src="/js/combat.js"></script>
</body>
</html>
