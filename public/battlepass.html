<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GACHA CARDS - Passe de Combat</title>
  <link rel="stylesheet" href="/css/style.css">
  <script>(function(){var t=localStorage.getItem('gacha-theme');if(t)document.documentElement.setAttribute('data-theme',t)})()</script>
</head>
<body class="bp-page">
  <div class="bg-grid"></div>
  <div class="scanline-bar"></div>

  <!-- NAVBAR -->
  <nav class="dash-navbar">
    <div class="dash-navbar-inner">
      <div class="dash-nav-logo" data-text="GACHA CARDS">GACHA CARDS</div>
      <div class="dash-nav-links">
        <a href="/menu" class="dash-nav-link">ACCUEIL</a>
        <a href="/shop" class="dash-nav-link dash-nav-link--shop">BOUTIQUE</a>
        <a href="/collection" class="dash-nav-link">COLLECTION</a>
        <a href="/mine" class="dash-nav-link dash-nav-link--mine">MINE</a>
        <a href="/combat" class="dash-nav-link dash-nav-link--combat">COMBAT</a>
        <a href="/battlepass" class="dash-nav-link dash-nav-link--active dash-nav-link--bp">PASSE</a>
        <a href="/market" class="dash-nav-link dash-nav-link--market">MARCHE</a>
        <a href="/casino" class="dash-nav-link dash-nav-link--casino">CASINO</a>
        <a href="/stats" class="dash-nav-link dash-nav-link--stats">STATS</a>
        <a href="/wiki" class="dash-nav-link">WIKI</a>
      </div>
      <div class="dash-nav-user">
        <span class="dash-nav-stat" title="Credits">&#128176; <span id="nav-credits">0</span></span>
        <span class="dash-nav-username" id="nav-username">???</span>
      </div>
    </div>
  </nav>

  <!-- BATTLE PASS CONTENT -->
  <div class="bp-container">
    <!-- Header -->
    <div class="bp-header">
      <h1 class="bp-title">PASSE DE COMBAT</h1>
      <div class="bp-xp-section">
        <div class="bp-tier-badge">
          <span class="bp-tier-num" id="bp-current-tier">0</span>
          <span class="bp-tier-slash">/30</span>
        </div>
        <div class="bp-xp-wrap">
          <div class="bp-xp-bar-bg">
            <div class="bp-xp-bar-fill" id="bp-xp-bar"></div>
          </div>
          <div class="bp-xp-text">
            <span id="bp-xp-current">0</span> / <span id="bp-xp-needed">100</span> XP
          </div>
        </div>
        <div class="bp-total-xp" id="bp-total-xp">0 XP total</div>
      </div>
    </div>

    <!-- Effect Selector -->
    <div class="bp-effect-bar" id="bp-effect-bar">
      <span class="bp-effect-label">EFFET ACTIF:</span>
      <div class="bp-effect-options" id="bp-effect-options">
        <button class="bp-effect-opt bp-effect-opt--active" data-effect="" onclick="setEffect('')">Aucun</button>
      </div>
    </div>

    <!-- Tier Track -->
    <div class="bp-track-scroll">
      <div class="bp-track" id="bp-track">
        <!-- Generated by JS -->
      </div>
    </div>
  </div>

  <!-- Reward Popup -->
  <div class="bp-reward-popup hidden" id="bp-reward-popup">
    <div class="bp-reward-content">
      <div class="bp-reward-emoji" id="bp-reward-emoji">🎁</div>
      <div class="bp-reward-text" id="bp-reward-text">Recompense !</div>
      <div class="bp-reward-detail" id="bp-reward-detail"></div>
      <button class="bp-reward-close" onclick="closeRewardPopup()">OK</button>
    </div>
  </div>

  <div class="version-tag">v1.2.0</div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/friends.js"></script>
  <script src="/js/battlepass.js"></script>
</body>
</html>
